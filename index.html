<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPAVS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="img/logo.png" alt="">
        <div class="inputBox">
            <div class="selectBox">
                <select id="TypeOfProperty" name="TypeOfProperty">
                    <option value="plot">Plot</option>
                    <option value="house">House</option>
                </select>
            </div>
            <button id="btn1">submit</button>
            <div id="searchBar">
                <input id="search" placeholder=" Enter id eg : p123" type="text">
                <button id = "b3"><i class="bi bi-search"></i></button>
            </div>
        </div>
        <div class="other">
            <div class="howToUse"></div>
            <button class="btn2" id="b1" onclick="">?</button>
            <button class="btn2" id="b2">&#8942;</button>
        </div>
    </header>
    <main>
        
        <div class="status">
            <h2 class="head"></h2>
            <div class="details"></div>
            <button class="analize">View Analysis</button>
        </div>
        <div class="container">
            <div>
                <h1> Welcome to VPAVS</h1>
                <p>To make decision correct</p>
            </div>
        </div>
    </main>
    <footer></footer>
</body>
<script src="script.js"></script>
</html>
